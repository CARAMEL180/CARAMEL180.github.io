    var positionX = [200, 100, 10, 20, 30, 30, 30, 30, 30, 30, 30, 30, 30, 30, 30, 30, 30, 30]

    function huhBoxAnimate() {

        ctx.clearRect(0, 0, 2000, 2000)
        // ctx.fillRect(mouseBoxPositionX + 10, mouseBoxPositionY + 10, 100, 100)
        positionX.unshift(mouseBoxPositionX - 8)
        positionY.unshift(mouseBoxPositionY - 8)
        for (let i = 0; i < positionX.length; i++) {            
            ctx.fillStyle = "#FF0000"
            ctx.strokeStyle = "black"
            ctx.lineWidth = 5
            ctx.fillRect(positionX[i] + 10, positionY[i] + 10, 100, 100)
            ctx.strokeRect(positionX[i] + 9, positionY[i] + 9, 101, 101)
        }
        positionX.pop()
        positionY.pop()
